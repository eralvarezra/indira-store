version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CRON_SECRET=${CRON_SECRET}
      - SITE_URL=${SITE_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    volumes:
      - ./public/uploads:/app/public/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.indirastore.entrypoints=web,websecure"
      - "traefik.http.routers.indirastore.rule=Host(`indirastore.online`) || Host(`www.indirastore.online`)"
      - "traefik.http.routers.indirastore.tls.certresolver=letsencrypt"
      - "traefik.http.services.indirastore.loadbalancer.server.port=3000"
    networks:
      - deploy_web

networks:
  deploy_web:
    external: true